<!DOCTYPE html>
<html>
<head>
    <title>Trip Cost Predictor</title>
</head>
<body>

<h2>Trip Cost Predictor 🚀</h2>

<form id="tripForm">
    Source: <input type="text" id="source"><br><br>
    Destination: <input type="text" id="destination"><br><br>
    Days: <input type="number" id="duration"><br><br>
    People: <input type="number" id="people"><br><br>

    Accommodation:
    <select id="accommodation">
        <option value="budget">Budget</option>
        <option value="mid">Mid</option>
        <option value="luxury">Luxury</option>
    </select><br><br>

    Travel Mode:
    <select id="mode">
        <option value="bus">Bus</option>
        <option value="train">Train</option>
        <option value="flight">Flight</option>
    </select><br><br>

    Activities: <input type="number" id="activities"><br><br>
    Travel Cost: <input type="number" id="travel_cost"><br><br>

    <button type="button" onclick="predict()">Predict</button>
</form>

<h3 id="result"></h3>

<script>
async function predict() {
    const data = {
        source: document.getElementById("source").value,
        destination: document.getElementById("destination").value,
        duration_days: document.getElementById("duration").value,
        num_people: document.getElementById("people").value,
        accommodation: document.getElementById("accommodation").value,
        travel_mode: document.getElementById("mode").value,
        num_activities: document.getElementById("activities").value,
        travel_cost: document.getElementById("travel_cost").value
    };

    const response = await fetch("/predict", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify(data)
    });

    const result = await response.json();

    document.getElementById("result").innerText =
        "Total Cost: ₹" + result.total_cost +
        " | Per Person: ₹" + result.cost_per_person;
}
</script>

</body>
</html>
